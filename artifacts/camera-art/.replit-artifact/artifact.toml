kind = "web"
previewPath = "/"
title = "摄像头互动艺术"
version = "1.0.0"
id = "artifacts/camera-art"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24007
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/camera-art run dev"

[services.env]
PORT = "24007"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/camera-art", "run", "build"]
publicDir = "artifacts/camera-art/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
